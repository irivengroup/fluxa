name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
          tools: composer:v2
          extensions: mbstring, json, dom, libxml, session
      - name: Validate composer.json
        run: composer validate --strict

  tests:
    runs-on: ubuntu-latest
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3']

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: composer:v2
          extensions: mbstring, json, dom, libxml, session

      - name: Cache Composer downloads
        uses: actions/cache@v4
        with:
          path: |
            ~/.composer/cache/files
            ~/.cache/composer/files
          key: composer-${{ runner.os }}-${{ matrix.php }}-${{ hashFiles('composer.json') }}
          restore-keys: |
            composer-${{ runner.os }}-${{ matrix.php }}-
            composer-${{ runner.os }}-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Dump optimized autoload
        run: composer dump-autoload -o

      - name: Lint PHP files
        run: composer lint

      - name: Run PHPUnit
        run: vendor/bin/phpunit --colors=never --display-warnings --display-deprecations

  static-analysis:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
          tools: composer:v2
          extensions: mbstring, json, dom, libxml, session
      - name: Cache Composer downloads
        uses: actions/cache@v4
        with:
          path: |
            ~/.composer/cache/files
            ~/.cache/composer/files
          key: composer-analysis-${{ runner.os }}-${{ hashFiles('composer.json') }}
          restore-keys: |
            composer-analysis-${{ runner.os }}-
      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist
      - name: Run PHPStan
        run: composer analyse
      - name: Run PHP CS Fixer dry-run
        run: composer cs
